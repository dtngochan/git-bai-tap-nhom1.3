name: Python Code Quality Check (CI)

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Unit Test
      run: |
        python -m unittest test_main.py